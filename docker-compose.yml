version: "3.9"

# Local development Postgres — mirrors the Neon schema.
# Not needed if you point DATABASE_URL directly at Neon.
services:
  postgres:
    image: postgres:16
    container_name: fittrack-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fittrack
    ports:
      - "5432:5432"
    volumes:
      - fittrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fittrack_postgres_data:
